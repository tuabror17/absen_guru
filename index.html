<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Digital Guru - Darul Abror</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #020617; --accent-cyan: #22d3ee; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1); }
        body { background-color: var(--bg-dark); background-image: radial-gradient(at 0% 0%, rgba(34, 211, 238, 0.1) 0px, transparent 50%); font-family: 'Plus Jakarta Sans', sans-serif; color: #f8fafc; min-height: 100vh; }
        .modern-glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); }
        #reader { width: 100% !important; border-radius: 30px; overflow: hidden; border: none !important; }
        .text-neon { color: var(--accent-cyan); text-shadow: 0 0 10px rgba(34, 211, 238, 0.3); }
        .btn-utility { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.3s ease; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--accent-cyan); top: 0; box-shadow: 0 0 15px var(--accent-cyan); animation: scan 2s linear infinite; z-index: 10; pointer-events: none; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .class-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; background: rgba(34, 211, 238, 0.1); border: 1px solid rgba(34, 211, 238, 0.2); margin: 3px; font-size: 10px; font-weight: 600; white-space: nowrap; color: #fff; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="w-full max-w-7xl">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <img src="https://lh3.googleusercontent.com/d/1KyFtChwYslz-KjbArLBgBFqClIkw5yg9" alt="Logo Mahad" class="w-14 h-14 object-contain drop-shadow-[0_0_8px_rgba(34,211,238,0.4)]">
                <div>
                    <h1 class="text-2xl font-black uppercase tracking-tighter text-white leading-tight">ABSENSI <span class="text-neon">DARUL ABROR</span></h1>
                    <p id="connection-status" class="text-[9px] font-bold text-yellow-500 tracking-[0.3em] uppercase">Connecting to Cloud...</p>
                </div>
            </div>
            <div class="flex gap-4 items-center">
                <button id="btn-change-name" onclick="window.changeMyIdentity()" class="hidden btn-utility text-slate-500 hover:text-white">Ganti Nama</button>
                <button onclick="window.promptAdmin()" class="px-5 py-2 rounded-xl modern-glass btn-utility text-slate-400 hover:text-cyan-400 transition-all active:scale-95">Admin Panel</button>
            </div>
        </header>

        <main>
            <section id="view-guru" class="max-w-2xl mx-auto w-full space-y-6">
                <div class="modern-glass p-8 md:p-12 rounded-[40px] text-center border-white/5 shadow-2xl">
                    <div id="identity-display" class="mb-4 hidden text-center">
                        <span class="text-[10px] font-bold text-cyan-500 uppercase tracking-widest italic">Ahlan wa Sahlan,</span>
                        <h2 id="my-name-display" class="text-2xl font-black text-white uppercase tracking-tight"></h2>
                    </div>
                    <div id="live-clock" class="text-7xl font-light tracking-tighter mb-2 tabular-nums text-white">00:00:00</div>
                    <div id="live-date" class="text-[10px] font-bold text-cyan-500 uppercase tracking-[0.4em] mb-12">...</div>

                    <div id="landing-scan">
                        <button id="btn-start-scan" disabled onclick="window.handleStartScan()" class="bg-slate-700 text-white px-14 py-5 rounded-2xl font-black uppercase text-sm transition-all opacity-50 cursor-not-allowed">Mulai Scan QR</button>
                    </div>

                    <div id="camera-container" class="hidden mt-6 animate-fade-in">
    <div class="relative inline-block w-full overflow-hidden rounded-[30px] border border-white/10 shadow-2xl">
        <div id="reader" class="mx-auto"></div>
        <div class="scan-line"></div>
    </div>
    
    <button onclick="location.reload()" class="mt-8 px-8 py-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 btn-utility hover:bg-red-500 hover:text-white transition-all flex items-center gap-2 mx-auto">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Kembali ke Menu Utama
    </button>
</div>
            </section>

            <section id="view-admin" class="hidden space-y-6">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h2 class="text-xl font-black text-white uppercase tracking-tight">REKAP DATA</h2>
            <p class="text-[9px] font-bold text-cyan-500 uppercase tracking-[0.3em]">Administrator Dashboard</p>
        </div>
        <button onclick="location.reload()" class="px-5 py-2 rounded-xl bg-white/5 border border-white/10 text-slate-400 btn-utility hover:bg-red-500 hover:text-white transition-all flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Kembali ke Scanner
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="modern-glass p-6 rounded-3xl border-white/5">
            <p class="text-[9px] font-bold text-slate-500 uppercase">Guru Absen</p>
            <h3 id="stat-total-guru" class="text-3xl font-black text-white">0</h3>
        </div>
        <div class="modern-glass p-6 rounded-3xl border-white/5">
            <p class="text-[9px] font-bold text-slate-500 uppercase">Total Scan</p>
            <h3 id="stat-total-scan" class="text-3xl font-black text-cyan-400">0</h3>
        </div>
        <div class="modern-glass p-6 rounded-3xl flex items-center">
            <button onclick="window.exportToExcel()" class="w-full py-3 bg-emerald-500 text-slate-950 text-[10px] font-bold uppercase rounded-xl hover:bg-emerald-400 transition-all shadow-lg shadow-emerald-500/20">
                Export Excel
            </button>
        </div>
    </div>

    <div class="modern-glass rounded-3xl overflow-hidden border border-white/5 shadow-2xl">
        <div class="overflow-x-auto">
            <table class="w-full text-left min-w-[1000px]">
                <thead class="bg-white/5 text-[9px] uppercase font-black text-cyan-500">
                    <tr>
                        <th class="p-5 text-white">Nama</th>
                        <th class="p-5">Tanggal</th>
                        <th class="p-5 text-center">Kantor</th>
                        <th class="p-5 text-center">Log SMA</th>
                        <th class="p-5 text-center">Log SMP</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-white/5 text-[10px] text-slate-300">
                    </tbody>
            </table>
        </div>
    </div>
</section>

    <div id="modal-success" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/98 backdrop-blur-md">
        <div class="modern-glass p-10 rounded-[40px] text-center max-w-sm w-full border border-cyan-500/30">
            <h3 id="modal-title" class="text-2xl font-black text-white uppercase mb-1">Berhasil!</h3>
            <p id="res-status" class="text-cyan-500 font-bold uppercase text-[10px] mb-6"></p>
            <div id="res-info" class="p-5 bg-white/5 rounded-2xl text-white font-bold italic mb-8 border border-white/10 text-sm whitespace-pre-line"></div>
            <button onclick="location.reload()" class="w-full py-4 bg-white text-slate-950 font-black rounded-xl uppercase text-xs">Selesai</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAT1t2gyYlEiZWdxPM8IeNu-t-VdyQ7de8",
            authDomain: "absenguru-59ca7.firebaseapp.com",
            projectId: "absenguru-59ca7",
            storageBucket: "absenguru-59ca7.firebasestorage.app",
            messagingSenderId: "1054936878576",
            appId: "1:1054936878576:web:c32e206c03aaa265742135"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let allAbsensi = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('connection-status').innerText = "CLOUD ONLINE";
                document.getElementById('connection-status').classList.replace('text-yellow-500', 'text-emerald-400');
                const btn = document.getElementById('btn-start-scan');
                btn.disabled = false;
                btn.className = "bg-white text-slate-950 px-14 py-5 rounded-2xl font-black uppercase text-sm hover:scale-105 transition-all shadow-2xl shadow-cyan-500/20 active:scale-95";

                onSnapshot(query(collection(db, "absensi"), orderBy("timestamp", "desc")), (snap) => {
                    allAbsensi = snap.docs.map(doc => doc.data());
                    if(!document.getElementById('view-admin').classList.contains('hidden')) window.renderAdminTable();
                });
            }
        });

        signInAnonymously(auth).catch(e => console.error("Auth Fail:", e));

        window.saveToCloud = async (rawTxt) => {
    // Fungsi sakti buat hapus tulisan "LOC:" kalau ada di hasil scan
    const txt = rawTxt.replace(/LOC:/gi, "").trim(); 
    
    const skrg = new Date();
    const entry = {
        nama: window.mySavedName,
        lokasi: txt, 
        waktu: skrg.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'}),
        tanggal: skrg.toLocaleDateString('id-ID'),
        timestamp: skrg.getTime(),
        createdAt: serverTimestamp()
    };

    const isDuplicate = allAbsensi.some(i => i.nama === entry.nama && i.lokasi === entry.lokasi && (entry.timestamp - i.timestamp) < 120000);
    
    if(isDuplicate) {
        showModal("Sudah Tercatat", "DUPLIKASI", `Anda baru saja scan di KELAS ${txt}`);
    } else {
        await addDoc(collection(db, "absensi"), entry);
        // MODAL SUKSES: Sekarang tampilannya cuma "KELAS 11"
        showModal("Berhasil!", `KELAS ${txt}`, `Ustadz/Ustadzah ${window.mySavedName}\nMasuk KELAS: ${txt}\nJam: ${entry.waktu}`);
    }
};

window.renderAdminTable = () => {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = "";
    const groups = {};
    
    allAbsensi.forEach(item => {
        const key = `${item.nama}_${item.tanggal}`;
        if(!groups[key]) groups[key] = { nama: item.nama, tanggal: item.tanggal, kantor: "-", sma: [], smp: [] };
        
        const loc = (item.lokasi || "").toUpperCase();
        // BADGE TABEL: GANTI LOC JADI KELAS
        const badge = `<span class="class-badge">KELAS ${loc} <span class="opacity-50 ml-1">${item.waktu}</span></span>`;
        
        if (loc === "SMA" || loc === "SMP" || loc.includes("KANTOR")) {
            groups[key].kantor = item.waktu;
        } 
        else if (loc.includes("10") || loc.includes("11") || loc.includes("12")) {
            groups[key].sma.push(badge);
        }
        else if (loc.includes("7") || loc.includes("8") || loc.includes("9")) {
            groups[key].smp.push(badge);
        }
        else {
            if(groups[key].kantor === "-") groups[key].kantor = item.waktu;
        }
    });

    document.getElementById('stat-total-guru').innerText = new Set(allAbsensi.map(i => i.nama)).size;
    document.getElementById('stat-total-scan').innerText = allAbsensi.length;

    Object.values(groups).forEach(g => {
        tbody.insertAdjacentHTML('beforeend', `
            <tr class="border-b border-white/5">
                <td class="p-5 font-bold text-white uppercase">${g.nama}</td>
                <td class="p-5 text-slate-500 font-bold">${g.tanggal}</td>
                <td class="p-5 text-center text-emerald-400 font-bold">${g.kantor}</td>
                <td class="p-5 text-center">${g.sma.join("") || "-"}</td>
                <td class="p-5 text-center">${g.smp.join("") || "-"}</td>
            </tr>
        `);
    });
};

        window.handleStartScan = async () => {
            if(!window.mySavedName) {
                const n = prompt("Masukan Nama Lengkap:");
                if(!n) return;
                window.mySavedName = n.trim();
                localStorage.setItem('user_full_name', window.mySavedName);
            }
            document.getElementById('landing-scan').classList.add('hidden');
            document.getElementById('camera-container').classList.remove('hidden');
            const scanner = new Html5Qrcode("reader");
            await scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, async (txt) => {
                await scanner.stop();
                window.saveToCloud(txt);
            });
        };

        window.promptAdmin = () => {
            if(prompt("Password Admin:") === "Admin1234") {
                document.getElementById('view-guru').classList.add('hidden');
                document.getElementById('view-admin').classList.remove('hidden');
                window.renderAdminTable();
            }
        };

        window.changeMyIdentity = function() {
            const n = prompt("Edit Nama Ustadz/Ustadzah:", window.mySavedName);
            if(n && n.trim()) { localStorage.setItem('user_full_name', n.trim()); location.reload(); }
        };

        window.exportToExcel = () => {
            let csv = "Nama,Tanggal,Lokasi,Waktu\n";
            allAbsensi.forEach(i => csv += `"${i.nama}","${i.tanggal}","${i.lokasi}","${i.waktu}"\n`);
            const a = document.createElement('a');
            a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
            a.download = 'Rekap_Absen.csv'; a.click();
        };

        function showModal(t, s, i) {
            document.getElementById('modal-title').innerText = t;
            document.getElementById('res-status').innerText = s;
            document.getElementById('res-info').innerText = i;
            document.getElementById('modal-success').classList.remove('hidden');
        }

        window.mySavedName = localStorage.getItem('user_full_name');
        if(window.mySavedName) {
            document.getElementById('identity-display').classList.remove('hidden');
            document.getElementById('my-name-display').innerText = window.mySavedName;
            document.getElementById('btn-change-name').classList.remove('hidden');
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('live-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();
        }, 1000);
    </script>
</body>
</html>
